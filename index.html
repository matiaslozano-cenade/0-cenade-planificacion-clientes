<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CENADE · Panel de Planificación</title>
<link rel="icon" type="image/jpeg" href="logo.jpeg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Surfaces */
    --bg-base:        #f4f6fa;
    --bg-elevated:    #ffffff;
    --bg-elevated-2:  #eff2f7;
    --bg-input:       #ffffff;
    --bg-hover:       rgba(15,23,42,0.04);

    /* Borders */
    --border-subtle:  rgba(15,23,42,0.06);
    --border-default: rgba(15,23,42,0.10);
    --border-strong:  rgba(15,23,42,0.18);

    /* Text */
    --text-primary:   #0f1c3a;
    --text-secondary: #475569;
    --text-tertiary:  #94a3b8;
    --text-disabled:  #cbd5e1;

    /* CENADE brand */
    --brand-navy:     #1e3a8a;
    --brand-navy-d:   #18306f;
    --brand-red:      #c8332d;
    --brand-red-d:    #b22a25;

    /* Accent */
    --accent:         var(--brand-navy);
    --accent-hover:   var(--brand-navy-d);
    --accent-glow:    rgba(30,58,138,0.18);
    --accent-soft:    rgba(30,58,138,0.07);

    /* Event type palette (corporate) */
    --c-meeting:   #1e3a8a;  /* navy   - reunión */
    --c-delivery:  #047857;  /* emerald - entrega */
    --c-deadline:  #b45309;  /* amber  - plazo */
    --c-milestone: #c8332d;  /* red    - hito */
    --c-review:    #5b21b6;  /* indigo - revisión */

    /* Shadows (light mode) */
    --shadow-sm:   0 1px 2px rgba(15,23,42,0.06);
    --shadow-md:   0 4px 14px rgba(15,23,42,0.08);
    --shadow-lg:   0 20px 50px rgba(15,23,42,0.18);
    --shadow-glow: 0 0 0 3px var(--accent-glow);

    --radius-xs: 4px;
    --radius-sm: 6px;
    --radius:    10px;
    --radius-lg: 14px;
    --radius-xl: 18px;

    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;

    --sidebar-w: 280px;
    --label-w:   220px;
    --day-w:     56px;
    --row-h:     56px;
  }

  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: var(--font-sans);
    background: var(--bg-base);
    color: var(--text-primary);
    font-feature-settings: 'cv11', 'ss01';
    letter-spacing: -0.01em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    display: grid;
    grid-template-rows: 56px 1fr;
    grid-template-columns: var(--sidebar-w) 1fr;
    grid-template-areas:
      "topbar topbar"
      "sidebar main";
    height: 100vh;
  }

  /* ── Topbar ── */
  .topbar {
    grid-area: topbar;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border-subtle);
    box-shadow: var(--shadow-sm);
    z-index: 10;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-logo {
    height: 32px;
    display: flex; align-items: center;
  }
  .brand-logo img {
    height: 100%;
    width: auto;
    display: block;
  }
  .brand-divider {
    width: 1px;
    height: 22px;
    background: var(--border-default);
  }
  .brand-text {
    display: flex; flex-direction: column;
    line-height: 1.2;
  }
  .brand-title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text-primary);
  }
  .brand-sub { font-size: 11px; color: var(--text-tertiary); font-weight: 400; margin-top: 2px; }

  .topbar-right { display: flex; align-items: center; gap: 10px; }

  .status-pill {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-tertiary);
    padding: 5px 12px;
    border: 1px solid var(--border-default);
    border-radius: 999px;
    background: var(--bg-elevated-2);
    display: flex; align-items: center; gap: 8px;
    transition: all 0.18s;
  }
  .status-pill::before {
    content: '';
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-tertiary);
  }
  .status-pill.ok::before    { background: var(--c-delivery); box-shadow: 0 0 8px var(--c-delivery); }
  .status-pill.err::before   { background: var(--c-milestone); box-shadow: 0 0 8px var(--c-milestone); }
  .status-pill.ok           { color: var(--c-delivery); border-color: rgba(52,211,153,0.3); }
  .status-pill.err          { color: var(--c-milestone); border-color: rgba(248,113,113,0.35); }

  /* ── Buttons ── */
  .btn {
    font-family: var(--font-sans);
    font-size: 12.5px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-default);
    background: var(--bg-elevated-2);
    color: var(--text-primary);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    letter-spacing: -0.01em;
  }
  .btn:hover {
    background: var(--bg-hover);
    border-color: var(--border-strong);
    transform: translateY(-1px);
  }
  .btn:active { transform: translateY(0); }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 1px 2px rgba(15,23,42,0.10), 0 0 0 1px rgba(30,58,138,0.4) inset;
  }
  .btn-primary:hover {
    background: var(--accent-hover);
    border-color: var(--accent-hover);
    box-shadow: 0 4px 12px var(--accent-glow), 0 0 0 1px rgba(30,58,138,0.4) inset;
  }
  .btn-danger {
    background: var(--brand-red);
    border-color: var(--brand-red);
    color: #fff;
  }
  .btn-danger:hover { background: var(--brand-red-d); border-color: var(--brand-red-d); }
  .btn-ghost {
    background: transparent;
    border-color: transparent;
  }
  .btn-ghost:hover { background: var(--bg-hover); border-color: var(--border-default); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

  /* ── Sidebar ── */
  .sidebar {
    grid-area: sidebar;
    background: var(--bg-elevated);
    border-right: 1px solid var(--border-subtle);
    overflow-y: auto;
    padding: 20px;
    display: flex; flex-direction: column;
    gap: 24px;
  }

  .sb-section { display: flex; flex-direction: column; gap: 10px; }
  .sb-section-head {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text-tertiary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .stat-card {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px;
    background: var(--bg-elevated-2);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    transition: all 0.15s;
  }
  .stat-card:hover { border-color: var(--border-default); transform: translateY(-1px); }
  .stat-card-left { display: flex; align-items: center; gap: 10px; }
  .stat-icon {
    width: 26px; height: 26px;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .stat-label { font-size: 12px; font-weight: 500; }
  .stat-value { font-size: 18px; font-weight: 600; font-family: var(--font-mono); letter-spacing: -0.02em; }

  .stat-total {
    background: linear-gradient(135deg, var(--accent-soft), transparent);
    border-color: rgba(30,58,138,0.28);
  }
  .stat-total .stat-value { color: var(--accent); }

  .filter-list { display: flex; flex-direction: column; gap: 4px; }
  .filter-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.12s;
    font-size: 12.5px;
    color: var(--text-secondary);
    background: transparent;
    border: 1px solid transparent;
    user-select: none;
  }
  .filter-item:hover { background: var(--bg-hover); color: var(--text-primary); }
  .filter-item.active { background: var(--bg-elevated-2); color: var(--text-primary); border-color: var(--border-default); }
  .filter-item .dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }
  .filter-item .check {
    margin-left: auto;
    width: 14px; height: 14px;
    color: var(--text-tertiary);
    opacity: 0;
    transition: opacity 0.12s;
  }
  .filter-item.active .check { opacity: 1; color: var(--text-primary); }

  /* ── Main ── */
  .main {
    grid-area: main;
    display: flex; flex-direction: column;
    overflow: hidden;
    background: var(--bg-base);
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border-subtle);
    flex-shrink: 0;
    background: var(--bg-base);
  }
  .month-nav {
    display: flex; align-items: center;
    gap: 2px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    padding: 2px;
  }
  .month-nav button {
    background: transparent; border: none;
    color: var(--text-secondary);
    width: 28px; height: 28px;
    border-radius: var(--radius-xs);
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.12s;
  }
  .month-nav button:hover { color: var(--text-primary); background: var(--bg-elevated-2); }
  .month-label {
    font-size: 13px; font-weight: 500;
    min-width: 140px; text-align: center;
    padding: 0 8px;
  }

  .toolbar-spacer { flex: 1; }

  .toolbar-info {
    font-size: 11.5px;
    color: var(--text-tertiary);
    font-family: var(--font-mono);
    letter-spacing: -0.02em;
  }

  /* ── Gantt ── */
  .gantt-outer {
    flex: 1;
    overflow: auto;
    position: relative;
  }
  .gantt-inner {
    min-width: max-content;
    padding: 0 24px 60px;
  }

  .gantt-grid {
    display: grid;
    grid-template-columns: var(--label-w) repeat(var(--days), var(--day-w));
  }

  /* Day header (sticky) */
  .gh-cell {
    position: sticky; top: 0;
    background: var(--bg-elevated);
    z-index: 5;
    padding: 14px 0 10px;
    border-bottom: 1px solid var(--border-default);
  }
  .gh-corner {
    position: sticky; top: 0; left: 0;
    z-index: 7;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border-default);
    border-right: 1px solid var(--border-default);
    padding: 14px 16px 10px;
    font-size: 10.5px;
    color: var(--text-tertiary);
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .gh-day {
    text-align: center;
    user-select: none;
  }
  .gh-day .day-num {
    display: block;
    font-size: 12px;
    font-weight: 500;
    font-family: var(--font-mono);
    color: var(--text-secondary);
  }
  .gh-day .day-wd {
    display: block;
    font-size: 9.5px;
    color: var(--text-tertiary);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .gh-day.today .day-num { color: var(--accent); font-weight: 700; }
  .gh-day.today .day-wd  { color: var(--accent); }
  .gh-day.weekend .day-num { color: var(--text-tertiary); }
  .gh-day.weekend .day-wd  { color: var(--text-disabled); }

  /* Client label (sticky left) */
  .client-label {
    position: sticky; left: 0;
    z-index: 4;
    display: flex; align-items: center;
    gap: 11px;
    padding: 0 12px 0 16px;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border-subtle);
    border-right: 1px solid var(--border-default);
    min-height: var(--row-h);
    cursor: pointer;
    transition: background 0.15s;
  }
  .client-label:hover { background: var(--bg-elevated-2); }
  .client-label::before {
    content: '';
    position: absolute;
    left: 0; top: 6px; bottom: 6px;
    width: 2px;
    background: var(--client-color, var(--accent));
    border-radius: 0 2px 2px 0;
    opacity: 0.7;
  }
  .client-avatar {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: var(--client-color, var(--accent));
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 1px 3px rgba(15,23,42,0.18);
    letter-spacing: 0;
  }
  .client-text { flex: 1; min-width: 0; }
  .client-name {
    font-size: 13px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .client-sub  {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .client-del {
    width: 24px; height: 24px;
    border: none;
    background: transparent;
    color: var(--text-tertiary);
    font-size: 14px;
    cursor: pointer;
    border-radius: var(--radius-xs);
    opacity: 0;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .client-label:hover .client-del { opacity: 1; }
  .client-del:hover { background: rgba(248,113,113,0.15); color: var(--c-milestone); }

  /* Day cells */
  .day-cell {
    position: relative;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border-subtle);
    border-left: 1px solid var(--border-subtle);
    min-height: var(--row-h);
    transition: background 0.12s;
  }
  .day-cell.weekend  { background: var(--bg-base); }
  .day-cell.today-col {
    background: linear-gradient(180deg, rgba(30,58,138,0.10), rgba(30,58,138,0.04));
    border-left: 2px solid rgba(30,58,138,0.55);
  }
  .row-hover .day-cell { background: var(--bg-elevated-2); }
  .row-hover .day-cell.weekend  { background: var(--bg-hover); }
  .row-hover .day-cell.today-col { background: linear-gradient(180deg, rgba(30,58,138,0.10), rgba(30,58,138,0.04)); }

  /* Event bar */
  .ev-bar {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    left: 4px;
    height: 28px;
    border-radius: var(--radius-xs);
    display: flex; align-items: center;
    padding: 0 9px;
    font-size: 11px; font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    z-index: 2;
    transition: all 0.15s;
    box-shadow: 0 1px 2px rgba(15,23,42,0.08);
    letter-spacing: -0.01em;
  }
  .ev-bar:hover {
    transform: translateY(-50%) translateY(-1px);
    box-shadow: 0 6px 16px rgba(15,23,42,0.14);
    z-index: 3;
  }
  .ev-bar::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: currentColor;
  }

  /* Event dot */
  .ev-dot {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 14px; height: 14px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 2;
    box-shadow: 0 0 0 2px var(--bg-elevated), 0 1px 4px rgba(15,23,42,0.18);
    transition: transform 0.15s;
  }
  .ev-dot:hover { transform: translate(-50%, -50%) scale(1.3); z-index: 3; }
  .ev-dot::after {
    content: '';
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: rgba(255,255,255,0.55);
  }

  .today-line {
    position: absolute;
    top: -8px; bottom: 0;
    left: 50%; transform: translateX(-50%);
    width: 1.5px;
    background: linear-gradient(180deg, var(--accent), transparent);
    z-index: 1;
    pointer-events: none;
    opacity: 0.7;
  }
  .today-line::before {
    content: '';
    position: absolute;
    top: -3px; left: 50%; transform: translateX(-50%);
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  /* Empty state */
  .empty-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px 20px;
    color: var(--text-tertiary);
    grid-column: 1 / -1;
    text-align: center;
    gap: 8px;
  }
  .empty-state svg { opacity: 0.4; margin-bottom: 12px; }
  .empty-state .et { font-size: 14px; font-weight: 500; color: var(--text-secondary); }
  .empty-state .es { font-size: 12.5px; }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    background: var(--bg-elevated);
    border: 1px solid var(--border-default);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 12.5px;
    color: var(--text-primary);
    pointer-events: none;
    z-index: 9999;
    max-width: 260px;
    display: none;
    box-shadow: var(--shadow-lg);
  }
  .tt-type {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .tt-type::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }
  .tt-desc { font-size: 13px; font-weight: 500; margin-bottom: 6px; line-height: 1.3; }
  .tt-date { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); }
  .tt-time { font-size: 11px; color: var(--text-secondary); font-family: var(--font-mono); margin-top: 3px; }
  .tt-recurring {
    font-size: 10.5px;
    color: var(--accent);
    margin-top: 6px;
    display: inline-block;
    padding: 2px 8px;
    background: var(--accent-soft);
    border-radius: 999px;
  }
  .tt-client {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .tt-hint {
    font-size: 10.5px;
    color: var(--text-disabled);
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid var(--border-subtle);
    font-family: var(--font-mono);
  }

  /* ── Day detail list ── */
  .day-modal { width: 640px; max-width: 96vw; }
  .day-list {
    display: flex; flex-direction: column;
    gap: 8px;
    max-height: 60vh;
    overflow-y: auto;
    padding-right: 4px;
    margin: -4px -4px 0;
  }
  .day-list-empty {
    padding: 48px 20px;
    text-align: center;
    color: var(--text-tertiary);
    font-size: 13px;
  }
  .day-list-empty svg { opacity: 0.3; margin-bottom: 8px; }
  .day-section-head {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin: 12px 4px 4px;
  }
  .day-section-head:first-child { margin-top: 4px; }
  .day-ev-item {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 14px;
    padding: 12px 14px;
    background: var(--bg-elevated-2);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
  }
  .day-ev-item:hover {
    border-color: var(--border-default);
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }
  .day-ev-time {
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--text-secondary);
    font-weight: 500;
    padding-top: 2px;
    line-height: 1.3;
  }
  .day-ev-time-all {
    font-size: 10.5px;
    color: var(--text-tertiary);
    font-family: var(--font-sans);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .day-ev-body {
    display: flex; flex-direction: column;
    gap: 5px;
    min-width: 0;
  }
  .day-ev-pill {
    display: inline-flex; align-items: center; gap: 5px;
    align-self: flex-start;
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 999px;
  }
  .day-ev-pill::before {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
  }
  .day-ev-desc {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .day-ev-client {
    font-size: 11px;
    color: var(--text-tertiary);
    display: flex; align-items: center; gap: 6px;
  }
  .day-ev-client::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 2px;
    background: var(--client-color, var(--accent));
    flex-shrink: 0;
  }

  .gh-day { cursor: pointer; user-select: none; transition: background 0.12s; border-radius: var(--radius-xs); }
  .gh-day:hover { background: var(--bg-elevated-2); }

  /* ── Day timeline ── */
  .day-tl {
    display: grid;
    grid-template-columns: 56px 1fr;
    margin-top: 4px;
    background: var(--bg-base);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    overflow: hidden;
    padding: 10px 12px 10px 0;
  }
  .day-tl-hours {
    display: flex; flex-direction: column;
  }
  .day-tl-hour-label {
    height: 60px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-tertiary);
    text-align: right;
    padding: 0 10px;
    position: relative;
    margin-top: -7px;
    line-height: 14px;
  }
  .day-tl-hour-label:first-child { margin-top: 0; }
  .day-tl-hour-label:last-child  { height: 0; }

  .day-tl-track {
    position: relative;
    height: 600px;
    border-left: 1px solid var(--border-default);
    background-image: linear-gradient(to bottom, var(--border-subtle) 1px, transparent 1px);
    background-size: 100% 60px;
  }

  .day-tl-ev {
    position: absolute;
    border-radius: var(--radius-sm);
    padding: 5px 8px;
    font-size: 11px;
    cursor: pointer;
    overflow: hidden;
    display: flex; flex-direction: column;
    gap: 1px;
    line-height: 1.25;
    transition: filter 0.12s, transform 0.12s;
    border-left: 3px solid;
    box-shadow: var(--shadow-sm);
    z-index: 2;
  }
  .day-tl-ev:hover { filter: brightness(1.18); transform: translateY(-1px); z-index: 4; }
  .day-tl-ev-time {
    font-family: var(--font-mono);
    font-size: 9.5px;
    opacity: 0.85;
    font-weight: 500;
  }
  .day-tl-ev-desc {
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .day-tl-ev-client {
    font-size: 9.5px;
    opacity: 0.78;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .day-tl-now {
    position: absolute;
    left: 0; right: 0;
    height: 0;
    border-top: 1.5px solid var(--accent);
    z-index: 5;
    pointer-events: none;
  }
  .day-tl-now::before {
    content: '';
    position: absolute;
    left: -4px; top: -4px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  .day-tl-now::after {
    content: attr(data-label);
    position: absolute;
    left: 8px; top: -16px;
    font-family: var(--font-mono);
    font-size: 9.5px;
    color: var(--accent);
    background: var(--bg-base);
    padding: 0 4px;
    border-radius: 3px;
    font-weight: 600;
  }

  /* ── Modal ── */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(15,23,42,0.45);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--bg-elevated);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-lg);
    padding: 24px 26px 22px;
    width: 420px; max-width: 95vw;
    box-shadow: var(--shadow-lg);
    animation: modalIn 0.22s cubic-bezier(0.2, 0.9, 0.3, 1);
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(10px); }
    to { opacity: 1; transform: none; }
  }
  .modal-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 4px;
  }
  .modal h2 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .modal-tag {
    font-size: 10px; font-weight: 600;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 3px 8px;
    border-radius: 999px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .modal-body { margin-top: 18px; display: flex; flex-direction: column; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label {
    font-size: 10.5px;
    color: var(--text-tertiary);
    letter-spacing: 0.06em;
    font-weight: 600;
    text-transform: uppercase;
  }
  .form-group input, .form-group select {
    width: 100%;
    font-family: var(--font-sans);
    font-size: 13px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-default);
    background: var(--bg-input);
    color: var(--text-primary);
    outline: none;
    transition: all 0.15s;
  }
  .form-group input::placeholder { color: var(--text-disabled); }
  .form-group input:focus, .form-group select:focus {
    border-color: var(--accent);
    box-shadow: var(--shadow-glow);
  }
  .form-group select option { background: var(--bg-input); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions {
    display: flex; gap: 8px; justify-content: flex-end;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border-subtle);
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: rgba(15,23,42,0.18);
    border-radius: 5px;
    border: 2px solid transparent;
    background-clip: content-box;
  }
  ::-webkit-scrollbar-thumb:hover { background: rgba(15,23,42,0.30); background-clip: content-box; border: 2px solid transparent; }
  ::-webkit-scrollbar-corner { background: transparent; }

  /* Responsive */
  @media (max-width: 900px) {
    body { grid-template-columns: 1fr; grid-template-areas: "topbar" "main"; }
    .sidebar { display: none; }
  }
</style>
</head>

<div id="tooltip"></div>

<div class="modal-bg" id="dayDetailBg">

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-head">

    <div class="modal-body">

        <label>Tipo</label>

</div>

<script>
const SUPABASE_URL = 'https://wjbwccacjdkuejcriode.supabase.co';
const SUPABASE_KEY = 'sb_publishable_pcI9qqrsLJuPw1fO4v3qQw_CL7VKxnt';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TYPE_CFG = {
  meeting:   { label: 'Reuniones',  short: 'Reunión',  color: '#1e3a8a', bg: 'rgba(30,58,138,0.10)'  },
  delivery:  { label: 'Entregas',   short: 'Entrega',  color: '#047857', bg: 'rgba(4,120,87,0.10)'   },
  deadline:  { label: 'Plazos',     short: 'Plazo',    color: '#b45309', bg: 'rgba(180,83,9,0.10)'   },
  milestone: { label: 'Hitos',      short: 'Hito',     color: '#c8332d', bg: 'rgba(200,51,45,0.10)'  },
  review:    { label: 'Revisiones', short: 'Revisión', color: '#5b21b6', bg: 'rgba(91,33,182,0.10)'  },
};
const TYPES = Object.keys(TYPE_CFG);

const AVATAR_PALETTE = ['#1e3a8a','#047857','#b45309','#c8332d','#5b21b6','#0e7490','#7c2d12','#a21caf'];

let CLIENTS = [];
let events = [];
let activeFilters = new Set(TYPES);
let editingClientId = null;
let editingEventId  = null;

const today = new Date(); today.setHours(0,0,0,0);
let currentYear = today.getFullYear();
let currentMonth = today.getMonth();

const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const WEEKDAYS = ['D','L','M','M','J','V','S'];

function parseDate(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function fmtDate(d){ return d.toLocaleDateString('es-CL',{day:'numeric',month:'short',year:'numeric'}); }
function getDays(y,m){ return new Date(y,m+1,0).getDate(); }

function clientColor(name){
  let h = 0;
  for(let i=0;i<name.length;i++) h = name.charCodeAt(i) + ((h<<5) - h);
  return AVATAR_PALETTE[Math.abs(h) % AVATAR_PALETTE.length];
}
function clientInitials(name){
  return name.trim().split(/\s+/).map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
}

function setStatus(text, kind){
  const p = document.getElementById('statusPill');
  p.textContent = text;
  p.className = 'status-pill' + (kind ? ' ' + kind : '');
}

async function loadData(){
  setStatus('Cargando…');
  const [{ data: clientsData, error: cErr }, { data: eventsData, error: eErr }] = await Promise.all([
    sb.from('clients').select('*').order('id'),
    sb.from('events').select('*').order('start_date'),
  ]);
  if(cErr || eErr){
    setStatus('Error de conexión', 'err');
    console.error(cErr || eErr);
    return;
  }
  CLIENTS = clientsData.map(c => ({ id: c.id, name: c.name, sub: c.sub }));
  events  = eventsData.map(e => ({
    id: e.id, client: e.client_id, type: e.type,
    start: e.start_date, end: e.end_date,
    startTime: e.start_time, endTime: e.end_time,
    recurrenceId: e.recurrence_group_id,
    desc: e.description,
  }));
  setStatus(`${CLIENTS.length} clientes · ${events.length} eventos`, 'ok');
  buildClientSelect();
  renderFilterList();
  render();
}

function renderFilterList(){
  const list = document.getElementById('filterList');
  list.innerHTML = '';
  TYPES.forEach(t => {
    const cfg = TYPE_CFG[t];
    const item = document.createElement('div');
    item.className = 'filter-item' + (activeFilters.has(t) ? ' active' : '');
    item.dataset.type = t;
    item.innerHTML = `
      <span class="dot" style="background:${cfg.color};box-shadow:0 0 6px ${cfg.color}55"></span>
      <span>${cfg.label}</span>
      <svg class="check" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="3 8.5 6.5 12 13 5"/></svg>`;
    item.addEventListener('click', () => {
      if(activeFilters.has(t)) activeFilters.delete(t);
      else activeFilters.add(t);
      renderFilterList();
      render();
    });
    list.appendChild(item);
  });
  document.getElementById('filterCount').textContent = `${activeFilters.size}/${TYPES.length}`;
}

function render(){
  const days = getDays(currentYear, currentMonth);
  document.getElementById('monthLabel').textContent = `${MONTHS[currentMonth]} ${currentYear}`;
  document.documentElement.style.setProperty('--days', days);

  const grid = document.getElementById('ganttGrid');
  grid.innerHTML = '';
  grid.style.gridTemplateColumns = `var(--label-w) repeat(${days}, var(--day-w))`;

  // Top-left corner cell
  const corner = document.createElement('div');
  corner.className = 'gh-corner';
  corner.textContent = 'Cliente';
  grid.appendChild(corner);

  // Day headers
  for(let d=1; d<=days; d++){
    const dt = new Date(currentYear, currentMonth, d);
    const isToday = dt.getTime()===today.getTime();
    const isWk = dt.getDay()===0 || dt.getDay()===6;
    const el = document.createElement('div');
    el.className = 'gh-cell gh-day' + (isToday?' today':'') + (isWk?' weekend':'');
    el.innerHTML = `<span class="day-num">${d}</span><span class="day-wd">${WEEKDAYS[dt.getDay()]}</span>`;
    el.title = 'Doble-click para ver detalle del día';
    el.addEventListener('dblclick', () => openDayDetail(currentYear, currentMonth, d));
    grid.appendChild(el);
  }

  if(!CLIENTS.length){
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="m22 11-3-3"/><path d="m22 8-3 3"/>
      </svg>
      <div class="et">No hay clientes todavía</div>
      <div class="es">Usa el botón "+ Cliente" para crear el primero.</div>`;
    grid.appendChild(empty);
    renderStats();
    document.getElementById('toolbarInfo').textContent = '';
    return;
  }

  // Client rows
  CLIENTS.forEach(client => {
    const color = clientColor(client.name);

    const labelEl = document.createElement('div');
    labelEl.className = 'client-label';
    labelEl.style.setProperty('--client-color', color);
    labelEl.title = 'Doble-click para editar';

    labelEl.innerHTML = `
      <div class="client-avatar"></div>
      <div class="client-text">
        <div class="client-name"></div>
        <div class="client-sub"></div>
      </div>
      <button class="client-del" title="Eliminar cliente">×</button>`;
    labelEl.querySelector('.client-avatar').textContent = clientInitials(client.name);
    labelEl.querySelector('.client-name').textContent   = client.name;
    labelEl.querySelector('.client-sub').textContent    = client.sub || '—';
    const delBtn = labelEl.querySelector('.client-del');
    delBtn.addEventListener('click', e => { e.stopPropagation(); deleteClient(client.id, client.name); });
    labelEl.addEventListener('dblclick', () => openClientModal(client));

    // Row hover effect
    const rowCells = [];
    labelEl.addEventListener('mouseenter', () => rowCells.forEach(c => c.classList.add('row-hover')));
    labelEl.addEventListener('mouseleave', () => rowCells.forEach(c => c.classList.remove('row-hover')));
    grid.appendChild(labelEl);

    const clientEvs = events.filter(e=>e.client===client.id && activeFilters.has(e.type));

    for(let d=1; d<=days; d++){
      const dt = new Date(currentYear, currentMonth, d);
      const isToday = dt.getTime()===today.getTime();
      const isWk = dt.getDay()===0||dt.getDay()===6;
      const cell = document.createElement('div');
      cell.className = 'day-cell' + (isWk?' weekend':'') + (isToday?' today-col':'');

      cell.addEventListener('mouseenter', () => labelEl.classList.add('row-hover'));
      cell.addEventListener('mouseleave', () => labelEl.classList.remove('row-hover'));
      cell.addEventListener('dblclick', e => {
        if(e.target !== cell) return; // ignore dblclicks bubbling from event bars/dots
        openDayDetail(currentYear, currentMonth, d);
      });
      rowCells.push(cell);

      if(isToday){
        const line = document.createElement('div');
        line.className = 'today-line';
        cell.appendChild(line);
      }

      clientEvs.forEach(ev => {
        const start = parseDate(ev.start);
        const end = ev.end ? parseDate(ev.end) : null;
        const cfg = TYPE_CFG[ev.type];

        if(end){
          if(dt.getTime()===start.getTime()){
            const span = Math.round((end-start)/(86400000))+1;
            const dayW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--day-w')) || 38;
            const bar = document.createElement('div');
            bar.className = 'ev-bar';
            bar.style.cssText = `background:${cfg.bg};color:${cfg.color};border:1px solid ${cfg.color}55;width:calc(${span}*var(--day-w) - 8px);`;
            bar.textContent = ev.desc;
            attachTooltip(bar, ev, client.name);
            attachEventActions(bar, ev, client.name);
            cell.appendChild(bar);
          }
        } else {
          if(dt.getTime()===start.getTime()){
            const dot = document.createElement('div');
            dot.className = 'ev-dot';
            dot.style.background = cfg.color;
            attachTooltip(dot, ev, client.name);
            attachEventActions(dot, ev, client.name);
            cell.appendChild(dot);
          }
        }
      });
      grid.appendChild(cell);
    }
  });

  renderStats();
  updateToolbarInfo();
}

function updateToolbarInfo(){
  const visible = events.filter(e => activeFilters.has(e.type));
  const monthVisible = visible.filter(e => {
    const d = parseDate(e.start);
    return d.getFullYear()===currentYear && d.getMonth()===currentMonth;
  });
  document.getElementById('toolbarInfo').textContent = `${monthVisible.length} eventos visibles · ${CLIENTS.length} clientes`;
}

function attachTooltip(el, ev, clientName){
  const cfg = TYPE_CFG[ev.type];
  el.addEventListener('mouseenter', e=>{
    const tip = document.getElementById('tooltip');
    let dateStr = fmtDate(parseDate(ev.start));
    if(ev.end) dateStr += ' → ' + fmtDate(parseDate(ev.end));
    let timeStr = '';
    if(ev.startTime){
      timeStr = ev.startTime.slice(0,5);
      if(ev.endTime) timeStr += ' → ' + ev.endTime.slice(0,5);
    }
    const recurringTag = ev.recurrenceId
      ? `<div class="tt-recurring">↻ Parte de una serie recurrente</div>` : '';
    tip.innerHTML = `
      <div class="tt-type" style="color:${cfg.color}">${cfg.short}</div>
      <div class="tt-desc"></div>
      <div class="tt-date">${dateStr}</div>
      ${timeStr ? `<div class="tt-time">🕐 ${timeStr}</div>` : ''}
      <div class="tt-client"></div>
      ${recurringTag}
      <div class="tt-hint">Doble-click: editar · Click derecho: eliminar</div>`;
    tip.querySelector('.tt-desc').textContent = ev.desc;
    tip.querySelector('.tt-client').textContent = clientName;
    tip.style.display='block';
    moveTip(e);
  });
  el.addEventListener('mousemove', moveTip);
  el.addEventListener('mouseleave', ()=>{ document.getElementById('tooltip').style.display='none'; });
}

function attachEventActions(el, ev, clientName){
  el.addEventListener('dblclick', e => {
    e.preventDefault();
    e.stopPropagation();
    document.getElementById('tooltip').style.display='none';
    openModal(ev);
  });
  el.addEventListener('contextmenu', async e => {
    e.preventDefault();
    document.getElementById('tooltip').style.display='none';

    if(ev.recurrenceId){
      const seriesCount = events.filter(x => x.recurrenceId === ev.recurrenceId).length;
      const all = confirm(
        `"${ev.desc}" es parte de una serie de ${seriesCount} eventos.\n\n` +
        `Aceptar  → eliminar TODA la serie\n` +
        `Cancelar → eliminar solo este evento`
      );
      setStatus('Eliminando…');
      const q = all
        ? sb.from('events').delete().eq('recurrence_group_id', ev.recurrenceId)
        : sb.from('events').delete().eq('id', ev.id);
      const { error } = await q;
      if(error){ setStatus('Error: ' + error.message, 'err'); return; }
    } else {
      if(!confirm(`¿Eliminar evento "${ev.desc}"?\nCliente: ${clientName}`)) return;
      setStatus('Eliminando…');
      const { error } = await sb.from('events').delete().eq('id', ev.id);
      if(error){ setStatus('Error: ' + error.message, 'err'); return; }
    }
    await loadData();
  });
}

function moveTip(e){
  const tip = document.getElementById('tooltip');
  let x = e.clientX+14, y = e.clientY-10;
  if(x+260>window.innerWidth) x = e.clientX-272;
  if(y+120>window.innerHeight) y = e.clientY-100;
  tip.style.left=x+'px'; tip.style.top=y+'px';
}

function renderStats(){
  const list = document.getElementById('statsList');
  list.innerHTML = '';
  const monthEvs = events.filter(e=>{
    const d = parseDate(e.start);
    return d.getFullYear()===currentYear && d.getMonth()===currentMonth;
  });
  const counts = {};
  TYPES.forEach(k=>counts[k]=0);
  monthEvs.forEach(e=>counts[e.type]++);

  // Total card
  const total = document.createElement('div');
  total.className = 'stat-card stat-total';
  total.style.marginBottom = '10px';
  total.innerHTML = `
    <div class="stat-card-left">
      <div class="stat-icon" style="background:rgba(91,141,239,0.2);color:var(--accent)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
      </div>
      <div class="stat-label">Total este mes</div>
    </div>
    <div class="stat-value">${monthEvs.length}</div>`;
  list.appendChild(total);

  // Per-type cards
  TYPES.forEach(t => {
    const cfg = TYPE_CFG[t];
    const card = document.createElement('div');
    card.className = 'stat-card';
    card.style.marginBottom = '6px';
    card.innerHTML = `
      <div class="stat-card-left">
        <div class="stat-icon" style="background:${cfg.bg};color:${cfg.color}">
          <span style="width:6px;height:6px;border-radius:50%;background:${cfg.color};box-shadow:0 0 6px ${cfg.color}"></span>
        </div>
        <div class="stat-label">${cfg.label}</div>
      </div>
      <div class="stat-value" style="color:${cfg.color}">${counts[t]}</div>`;
    list.appendChild(card);
  });
}

function changeMonth(dir){
  currentMonth += dir;
  if(currentMonth<0){ currentMonth=11; currentYear--; }
  if(currentMonth>11){ currentMonth=0; currentYear++; }
  render();
}

function goToday(){
  currentYear=today.getFullYear(); currentMonth=today.getMonth();
  render();
  setTimeout(()=>{
    const outer=document.getElementById('ganttOuter');
    const dayW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--day-w')) || 38;
    const labelW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--label-w')) || 220;
    const dayOfMonth = today.getDate();
    outer.scrollLeft = labelW+(dayOfMonth-4)*dayW;
  },50);
}

function openModal(ev, defaultStart){
  if(!CLIENTS.length){
    if(confirm('Aún no hay clientes. ¿Crear uno ahora?')) openClientModal();
    return;
  }
  editingEventId = ev ? ev.id : null;
  const isEdit = !!ev;

  document.getElementById('eTitle').textContent     = isEdit ? 'Editar evento' : 'Nuevo evento';
  document.getElementById('saveBtn').textContent    = isEdit ? 'Guardar cambios' : 'Crear evento';

  // Hide recurrence section in edit mode (no aplica modificar serie desde aquí)
  const recGroup   = document.getElementById('mRecurrence').closest('.form-group');
  const untilGroup = document.getElementById('mUntilGroup');
  recGroup.style.display = isEdit ? 'none' : '';
  untilGroup.style.display = 'none';

  if(isEdit){
    document.getElementById('mClient').value     = ev.client;
    document.getElementById('mType').value       = ev.type;
    document.getElementById('mStart').value      = ev.start;
    document.getElementById('mEnd').value        = ev.end || '';
    document.getElementById('mStartTime').value  = ev.startTime ? ev.startTime.slice(0,5) : '';
    document.getElementById('mEndTime').value    = ev.endTime   ? ev.endTime.slice(0,5)   : '';
    document.getElementById('mRecurrence').value = 'none';
    document.getElementById('mUntil').value      = '';
    document.getElementById('mDesc').value       = ev.desc || '';
  } else {
    const y=currentYear, m=String(currentMonth+1).padStart(2,'0');
    document.getElementById('mStart').value      = defaultStart || `${y}-${m}-01`;
    document.getElementById('mEnd').value        = '';
    document.getElementById('mStartTime').value  = '';
    document.getElementById('mEndTime').value    = '';
    document.getElementById('mRecurrence').value = 'none';
    document.getElementById('mUntil').value      = '';
    document.getElementById('mDesc').value       = '';
  }
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){
  document.getElementById('modalBg').classList.remove('open');
  editingEventId = null;
}

document.getElementById('modalBg').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});

document.getElementById('mRecurrence').addEventListener('change', e => {
  document.getElementById('mUntilGroup').style.display = e.target.value === 'none' ? 'none' : '';
});

function openClientModal(client){
  editingClientId = client ? client.id : null;
  document.getElementById('cTitle').textContent          = client ? 'Editar cliente' : 'Nuevo cliente';
  document.getElementById('saveClientBtn').textContent   = client ? 'Guardar cambios' : 'Crear cliente';
  document.getElementById('cName').value = client ? client.name : '';
  document.getElementById('cSub').value  = client ? (client.sub || '') : '';

  setTimeout(() => document.getElementById('cName').focus(), 60);
}
function closeClientModal(){
  document.getElementById('clientModalBg').classList.remove('open');

}

document.getElementById('clientModalBg').addEventListener('click', function(e){
  if(e.target===this) closeClientModal();
});

async function saveClient(){
  const btn  = document.getElementById('saveClientBtn');
  const name = document.getElementById('cName').value.trim();
  const sub  = document.getElementById('cSub').value.trim() || null;
  if(!name){ alert('El nombre es obligatorio'); return; }

  btn.disabled = true;
  const original = btn.textContent;
  btn.textContent = 'Guardando…';
  const q = editingClientId
    ? sb.from('clients').update({ name, sub }).eq('id', editingClientId)
    : sb.from('clients').insert({ name, sub });
  const { error } = await q;
  btn.disabled = false; btn.textContent = original;
  if(error){ alert('Error: ' + error.message); return; }
  closeClientModal();
  await loadData();
}

async function deleteClient(id, name){
  const evCount = events.filter(e => e.client === id).length;
  const msg = evCount > 0
    ? `¿Eliminar el cliente "${name}"?\nEsto también borrará ${evCount} evento(s) asociado(s).`
    : `¿Eliminar el cliente "${name}"?`;
  if(!confirm(msg)) return;
  setStatus('Eliminando…');
  const { error } = await sb.from('clients').delete().eq('id', id);
  if(error){ setStatus('Error: ' + error.message, 'err'); return; }
  await loadData();
}

function fmtIsoDate(d){
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function generateOccurrences(startStr, endStr, recurrence, untilStr){
  const start = parseDate(startStr);
  const end   = endStr ? parseDate(endStr) : null;
  const until = parseDate(untilStr);
  const durationMs = end ? (end - start) : 0;

  const occurrences = [];
  const MAX = 200;
  const cur = new Date(start);

  while(cur <= until && occurrences.length < MAX){
    const s = new Date(cur);
    const e = end ? new Date(s.getTime() + durationMs) : null;
    occurrences.push({ start: fmtIsoDate(s), end: e ? fmtIsoDate(e) : null });

    if(recurrence === 'daily')         cur.setDate(cur.getDate() + 1);
    else if(recurrence === 'weekly')   cur.setDate(cur.getDate() + 7);
    else if(recurrence === 'biweekly') cur.setDate(cur.getDate() + 14);
    else if(recurrence === 'monthly')  cur.setMonth(cur.getMonth() + 1);
    else break;
  }
  return occurrences;
}

async function saveEvent(){
  const btn = document.getElementById('saveBtn');
  const client_id = parseInt(document.getElementById('mClient').value);
  const type      = document.getElementById('mType').value;
  const start     = document.getElementById('mStart').value;
  const end       = document.getElementById('mEnd').value || null;
  const startTime = document.getElementById('mStartTime').value || null;
  const endTime   = document.getElementById('mEndTime').value || null;
  const recurrence= document.getElementById('mRecurrence').value;
  const until     = document.getElementById('mUntil').value || null;
  const desc      = document.getElementById('mDesc').value.trim() || TYPE_CFG[type].short;

  if(!start){ alert('Selecciona fecha de inicio'); return; }
  if(recurrence !== 'none' && !until){ alert('Indica hasta cuándo se repite'); return; }
  if(recurrence !== 'none' && parseDate(until) < parseDate(start)){
    alert('La fecha "Repetir hasta" debe ser igual o posterior al inicio');
    return;
  }

  btn.disabled = true;
  const originalLabel = btn.textContent;
  btn.textContent = 'Guardando…';

  if(editingEventId){
    const { error } = await sb.from('events').update({
      client_id, type,
      start_date: start, end_date: end,
      start_time: startTime, end_time: endTime,
      description: desc,
    }).eq('id', editingEventId);
    btn.disabled = false; btn.textContent = originalLabel;
    if(error){ alert('Error: ' + error.message); return; }
  } else {
    let rows;
    if(recurrence === 'none'){
      rows = [{
        client_id, type,
        start_date: start, end_date: end,
        start_time: startTime, end_time: endTime,
        description: desc,
      }];
    } else {
      const groupId = (crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random().toString(36).slice(2));
      const occs = generateOccurrences(start, end, recurrence, until);
      rows = occs.map(o => ({
        client_id, type,
        start_date: o.start, end_date: o.end,
        start_time: startTime, end_time: endTime,
        description: desc,
        recurrence_group_id: groupId,
      }));
    }
    const { error } = await sb.from('events').insert(rows);
    btn.disabled = false; btn.textContent = originalLabel;
    if(error){ alert('Error: ' + error.message); return; }
  }
  closeModal();
  await loadData();
}

function exportCSV(){
  const rows=[['Cliente','Tipo','Descripción','Inicio','Fin','Hora inicio','Hora fin','Serie']];
  events.forEach(ev=>{
    const c=CLIENTS.find(x=>x.id===ev.client);
    rows.push([
      c ? c.name : '',
      TYPE_CFG[ev.type].short,
      ev.desc,
      ev.start,
      ev.end||ev.start,
      ev.startTime||'',
      ev.endTime||'',
      ev.recurrenceId||'',
    ]);
  });
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,﻿'+encodeURIComponent(csv);
  a.download='planificacion-clientes.csv';
  a.click();
}

// ── Day detail ──
let currentDayIso = null;

const HOUR_START = 8;
const HOUR_END   = 18;
const TL_HEIGHT_PX = (HOUR_END - HOUR_START) * 60;

function openDayDetail(year, month, day){
  const dt = new Date(year, month, day);
  const iso = fmtIsoDate(dt);
  currentDayIso = iso;

  const fmt = dt.toLocaleDateString('es-CL', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  document.getElementById('dayTitle').textContent = fmt.charAt(0).toUpperCase() + fmt.slice(1);

  const dayEvs = events.filter(ev => {
    const s = parseDate(ev.start);
    const e = ev.end ? parseDate(ev.end) : s;
    return dt >= s && dt <= e;
  });

  const isStartDay = (ev) => parseDate(ev.start).getTime() === dt.getTime();

  const allDay = [];
  const timed  = [];
  const outside = [];

  dayEvs.forEach(ev => {
    const hasTime = ev.startTime && isStartDay(ev);
    if(!hasTime){ allDay.push(ev); return; }

    const [sh, sm] = ev.startTime.split(':').map(Number);
    let eh, em;
    if(ev.endTime){ [eh, em] = ev.endTime.split(':').map(Number); }
    else { eh = sh + 1; em = sm; }
    const startMin = sh * 60 + sm;
    const endMin   = eh * 60 + em;

    const enriched = { ev, startMin, endMin };
    if(endMin <= HOUR_START * 60 || startMin >= HOUR_END * 60) outside.push(enriched);
    else timed.push(enriched);
  });

  // Column assignment for overlapping events
  const sortedTimed = [...timed].sort((a, b) => a.startMin - b.startMin);
  const cols = [];
  sortedTimed.forEach(item => {
    let placed = false;
    for(let i=0; i<cols.length; i++){
      const last = cols[i][cols[i].length-1];
      if(last.endMin <= item.startMin){
        cols[i].push(item);
        item.col = i;
        placed = true;
        break;
      }
    }
    if(!placed){
      cols.push([item]);
      item.col = cols.length - 1;
    }
  });
  const totalCols = Math.max(1, cols.length);

  const listEl = document.getElementById('dayEvList');
  listEl.innerHTML = '';

  if(allDay.length){
    const head = document.createElement('div');
    head.className = 'day-section-head';
    head.textContent = `Todo el día · ${allDay.length}`;
    listEl.appendChild(head);
    allDay.forEach(ev => listEl.appendChild(buildDayEvItem(ev, true)));
  }

  // Timeline section (always shown so el usuario ve los slots libres)
  const tlHead = document.createElement('div');
  tlHead.className = 'day-section-head';
  tlHead.textContent = `Horario · ${pad2(HOUR_START)}:00 a ${pad2(HOUR_END)}:00`;
  listEl.appendChild(tlHead);

  const tl = document.createElement('div');
  tl.className = 'day-tl';

  const hoursEl = document.createElement('div');
  hoursEl.className = 'day-tl-hours';
  for(let h=HOUR_START; h<=HOUR_END; h++){
    const lbl = document.createElement('div');
    lbl.className = 'day-tl-hour-label';
    lbl.textContent = `${pad2(h)}:00`;
    hoursEl.appendChild(lbl);
  }
  tl.appendChild(hoursEl);

  const track = document.createElement('div');
  track.className = 'day-tl-track';
  track.style.height = TL_HEIGHT_PX + 'px';

  sortedTimed.forEach(item => {
    const ev = item.ev;
    const cfg = TYPE_CFG[ev.type];
    const baseMin = HOUR_START * 60;
    const top    = Math.max(0, item.startMin - baseMin);
    const bottom = Math.min(TL_HEIGHT_PX, item.endMin - baseMin);
    const height = Math.max(22, bottom - top);
    const widthPct = 100 / totalCols;
    const leftPct  = item.col * widthPct;

    const node = document.createElement('div');
    node.className = 'day-tl-ev';
    node.style.cssText =
      `top:${top}px;height:${height}px;` +
      `left:calc(${leftPct}% + 4px);width:calc(${widthPct}% - 8px);` +
      `background:${cfg.bg};color:${cfg.color};border-color:${cfg.color};`;

    const client = CLIENTS.find(c => c.id === ev.client);
    const timeStr = ev.endTime
      ? `${ev.startTime.slice(0,5)} – ${ev.endTime.slice(0,5)}`
      : ev.startTime.slice(0,5);

    const showClient = height >= 50;
    node.innerHTML = `
      <div class="day-tl-ev-time">${timeStr}</div>
      <div class="day-tl-ev-desc"></div>
      ${showClient ? `<div class="day-tl-ev-client"></div>` : ''}`;
    node.querySelector('.day-tl-ev-desc').textContent = ev.desc;
    if(showClient) node.querySelector('.day-tl-ev-client').textContent = client ? client.name : '';
    node.title = `${timeStr} · ${ev.desc}${client ? ' · ' + client.name : ''}\nClick para editar`;
    node.addEventListener('click', () => {
      closeDayDetail();
      openModal(ev);
    });
    track.appendChild(node);
  });

  // "Now" line if today
  if(year===today.getFullYear() && month===today.getMonth() && day===today.getDate()){
    const now = new Date();
    const nowMin = now.getHours()*60 + now.getMinutes();
    if(nowMin >= HOUR_START*60 && nowMin <= HOUR_END*60){
      const nowEl = document.createElement('div');
      nowEl.className = 'day-tl-now';
      nowEl.style.top = (nowMin - HOUR_START*60) + 'px';
      nowEl.dataset.label = `Ahora ${pad2(now.getHours())}:${pad2(now.getMinutes())}`;
      track.appendChild(nowEl);
    }
  }

  tl.appendChild(track);
  listEl.appendChild(tl);

  if(outside.length){
    const head = document.createElement('div');
    head.className = 'day-section-head';
    head.textContent = `Fuera de horario · ${outside.length}`;
    listEl.appendChild(head);
    outside.forEach(item => listEl.appendChild(buildDayEvItem(item.ev, false)));
  }

  document.getElementById('dayDetailBg').classList.add('open');
}

function pad2(n){ return String(n).padStart(2,'0'); }

function buildDayEvItem(ev, isAllDay){
  const client = CLIENTS.find(c => c.id === ev.client);
  const cfg = TYPE_CFG[ev.type];
  const item = document.createElement('div');
  item.className = 'day-ev-item';

  const timeHtml = isAllDay
    ? `<span class="day-ev-time-all">Todo el día</span>`
    : (ev.endTime
        ? `${ev.startTime.slice(0,5)}<br>→ ${ev.endTime.slice(0,5)}`
        : ev.startTime.slice(0,5));

  item.innerHTML = `
    <div class="day-ev-time">${timeHtml}</div>
    <div class="day-ev-body">
      <span class="day-ev-pill" style="background:${cfg.bg};color:${cfg.color}">${cfg.short}</span>
      <div class="day-ev-desc"></div>
      <div class="day-ev-client" style="--client-color:${client ? clientColor(client.name) : 'var(--accent)'}"></div>
    </div>`;
  item.querySelector('.day-ev-desc').textContent = ev.desc;
  item.querySelector('.day-ev-client').textContent = client ? client.name : '—';
  item.title = 'Click para editar';
  item.addEventListener('click', () => {
    closeDayDetail();
    openModal(ev);
  });
  return item;
}

function closeDayDetail(){
  document.getElementById('dayDetailBg').classList.remove('open');
}

document.getElementById('dayDetailBg').addEventListener('click', function(e){
  if(e.target===this) closeDayDetail();
});

document.getElementById('dayAddBtn').addEventListener('click', () => {
  const iso = currentDayIso;
  closeDayDetail();
  openModal(null, iso);
});

function buildClientSelect(){
  const sel=document.getElementById('mClient');
  sel.innerHTML='';
  CLIENTS.forEach(c=>{
    const o=document.createElement('option');
    o.value=c.id; o.textContent=c.name;
    sel.appendChild(o);
  });
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if(e.target.matches('input, select, textarea')) return;
  if(e.key === 'Escape'){ closeModal(); closeClientModal(); closeDayDetail(); }
  if(e.key === 'ArrowLeft'  && (e.metaKey||e.ctrlKey)){ e.preventDefault(); changeMonth(-1); }
  if(e.key === 'ArrowRight' && (e.metaKey||e.ctrlKey)){ e.preventDefault(); changeMonth(1); }
  if(e.key === 't' || e.key === 'T') goToday();
  if(e.key === 'n' || e.key === 'N') openModal();
});

loadData().then(()=>{
  setTimeout(()=>{
    if(currentYear===today.getFullYear()&&currentMonth===today.getMonth()){
      const outer=document.getElementById('ganttOuter');
      const dayW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--day-w')) || 38;
      const labelW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--label-w')) || 220;
      outer.scrollLeft = labelW+(today.getDate()-4)*dayW;
    }
  },120);
});
